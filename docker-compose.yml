version: '3.8'
name: cinemacore

services:
  # ==========================================
  # INFRAESTRUCTURA BASE
  # ==========================================
  cinestar-postgres:
    image: postgres:15-alpine
    container_name: cinestar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-root}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./.docker/postgres/init-db:/docker-entrypoint-initdb.d
    networks:
      - cinestar-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 15s
      retries: 10
      start_period: 20s

  cinestar-redis:
    image: redis:7-alpine
    container_name: cinestar-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      - "6379:6379"
    networks:
      - cinestar-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # MICROSERVICIOS
  # ==========================================
  cinestar-auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile
    container_name: cinestar-auth-service
    restart: on-failure
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://cinestar-postgres:5432/db_auth
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-root}
      - JWT_SECRET=${JWT_SECRET}
    ports:
      - "8081:8081"
    depends_on:
      cinestar-postgres:
        condition: service_healthy
    networks:
      - cinestar-network

  cinestar-movie-service:
    build:
      context: .
      dockerfile: backend/movie-service/Dockerfile
    container_name: cinestar-movie-service
    restart: on-failure
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://cinestar-postgres:5432/db_movies
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-root}
      - SPRING_REDIS_HOST=cinestar-redis
      - SPRING_REDIS_PORT=6379
      - TMDB_API_KEY=${TMDB_API_KEY}
      - TMDB_API_TOKEN=${TMDB_API_TOKEN}
    ports:
      - "8082:8082"
    depends_on:
      cinestar-postgres:
        condition: service_healthy
      cinestar-redis:
        condition: service_healthy
    networks:
      - cinestar-network

  cinestar-api-gateway:
    build:
      context: .
      dockerfile: backend/api-gateway/Dockerfile
    container_name: cinestar-api-gateway
    restart: on-failure
    environment:
      - PORT=8080
      - JWT_SECRET=${JWT_SECRET}
      - AUTH_SERVICE_URL=http://cinestar-auth-service:8081
      - MOVIE_SERVICE_URL=http://cinestar-movie-service:8082
      - SEAT_SERVICE_URL=http://cinestar-seat-service:8083
      - SHOWTIME_SERVICE_URL=http://cinestar-showtime-service:8084
    ports:
      - "8080:8080"
    depends_on:
      - cinestar-auth-service
      - cinestar-movie-service
    networks:
      - cinestar-network

# ==========================================
# VOLUMENES Y REDES
# ==========================================
volumes:
  postgres_data:
    name: cinestar_postgres_data

networks:
  cinestar-network:
    name: cinestar_network
    driver: bridge
