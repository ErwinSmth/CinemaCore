<div class="min-h-screen bg-slate-900 flex flex-col">
  <!-- Topbar Admin -->
  <header class="bg-slate-800 border-b border-slate-700">
    <div class="container mx-auto px-4 h-16 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <span class="text-xl font-bold text-red-600">CINEMACORE <span class="text-slate-400 font-medium">ADMIN</span></span>
      </div>
      
      <div class="flex items-center gap-4">
        <a routerLink="/" class="text-sm text-slate-400 hover:text-white transition">Ir al Home</a>
        <button (click)="logout()" class="text-sm bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded transition">Cerrar Sesión</button>
      </div>
    </div>
  </header>

  <!-- Content -->
  <main class="flex-1 container mx-auto px-4 py-8">
    <div class="bg-slate-800 rounded border border-slate-700/50 p-8 text-center">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-slate-700 text-red-500 mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      </div>
      <h2 class="text-2xl font-bold text-white mb-2">Panel de Administración</h2>
      <p class="text-slate-400 max-w-md mx-auto">
        Bienvenido al panel de control. Aquí se implementarán próximamente las funcionalidades para gestionar películas, salas, horarios y reportes de ventas.
      </p>
    </div>
  </main>
</div>
