<div class="min-h-screen flex flex-col">
  <!-- Navbar -->
  <header class="bg-slate-900 border-b border-slate-800 sticky top-0 z-50">
    <div class="container mx-auto px-4 h-16 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="text-2xl font-bold text-red-600 tracking-wider">CINEMACORE</span>
      </div>
      
      <nav class="flex items-center gap-4">
        @if (!isAuthenticated()) {
          <a routerLink="/login" class="text-sm font-medium text-slate-300 hover:text-white transition">Ingresar</a>
          <a routerLink="/register" class="text-sm font-medium bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded transition">Registrarse</a>
        } @else {
          @if (isAdmin()) {
            <a routerLink="/admin" class="text-sm font-medium bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded transition border border-slate-600">Panel Admin</a>
          }
          <button (click)="logout()" class="text-sm font-medium text-slate-400 hover:text-red-500 transition">Cerrar Sesión</button>
        }
      </nav>
    </div>
  </header>

  <!-- Hero / Cartelera Skeleton -->
  <main class="flex-1 bg-slate-900">
    <!-- Hero Banner -->
    <section class="relative h-[60vh] bg-slate-800 flex items-center justify-center border-b border-slate-800">
      <div class="absolute inset-0 bg-gradient-to-t from-slate-900 to-transparent"></div>
      <div class="relative z-10 text-center space-y-4">
        <h1 class="text-4xl md:text-6xl font-bold text-white tracking-tight">VIVE LA MAGIA DEL CINE</h1>
        <p class="text-xl text-slate-400">Descubre los próximos estrenos y reserva tus asientos hoy.</p>
      </div>
    </section>

    <!-- Movies Grid -->
    <section class="container mx-auto px-4 py-16">
      <div class="flex items-center justify-between mb-8">
        <h2 class="text-2xl font-bold text-white">Cartelera Actual</h2>
        <span class="text-sm text-slate-500 uppercase tracking-widest font-medium">Próximamente...</span>
      </div>

      <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
        <!-- Skeleton Cards -->
        @for (item of [1,2,3,4]; track item) {
          <div class="space-y-4">
            <div class="aspect-[2/3] bg-slate-800 rounded animate-pulse"></div>
            <div class="space-y-2">
              <div class="h-4 bg-slate-800 rounded w-3/4 animate-pulse"></div>
              <div class="h-3 bg-slate-800 rounded w-1/2 animate-pulse"></div>
            </div>
            <div class="h-10 bg-slate-800 rounded w-full animate-pulse mt-2"></div>
          </div>
        }
      </div>
    </section>
  </main>
</div>
