<div class="min-h-screen flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md bg-slate-800 rounded px-8 py-10 shadow-lg border border-slate-700/50">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-red-600">CINEMACORE</h1>
    </div>

    <h2 class="text-2xl font-bold text-white mb-6 text-center">Crear Cuenta</h2>

    @if (errorMessage()) {
      <div class="bg-red-900/50 border border-red-500 text-red-200 px-4 py-3 rounded mb-6 text-sm">
        {{ errorMessage() }}
      </div>
    }

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-4">
      <div class="grid grid-cols-2 gap-4">
        <div class="space-y-2">
          <label for="nombres" class="block text-sm font-medium text-slate-300">Nombres</label>
          <input
            id="nombres"
            type="text"
            formControlName="nombres"
            class="w-full px-3 py-2 bg-slate-700 text-white border border-slate-600 rounded focus:outline-none focus:ring-2 focus:ring-red-600 focus:border-transparent"
            required
          />
        </div>
        <div class="space-y-2">
          <label for="apellidos" class="block text-sm font-medium text-slate-300">Apellidos</label>
          <input
            id="apellidos"
            type="text"
            formControlName="apellidos"
            class="w-full px-3 py-2 bg-slate-700 text-white border border-slate-600 rounded focus:outline-none focus:ring-2 focus:ring-red-600 focus:border-transparent"
            required
          />
        </div>
      </div>

      <div class="space-y-2">
        <label for="email" class="block text-sm font-medium text-slate-300">Correo Electrónico</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          class="w-full px-3 py-2 bg-slate-700 text-white placeholder-slate-500 border border-slate-600 rounded focus:outline-none focus:ring-2 focus:ring-red-600 focus:border-transparent"
          placeholder="tu@correo.com"
          required
        />
      </div>

      <div class="space-y-2">
        <label for="contrasena" class="block text-sm font-medium text-slate-300">Contraseña</label>
        <input
          id="contrasena"
          type="password"
          formControlName="contrasena"
          class="w-full px-3 py-2 bg-slate-700 text-white placeholder-slate-500 border border-slate-600 rounded focus:outline-none focus:ring-2 focus:ring-red-600 focus:border-transparent"
          placeholder="••••••••"
          required
        />
      </div>

      <button
        type="submit"
        [disabled]="registerForm.invalid || isLoading()"
        class="w-full py-2 px-4 bg-red-600 hover:bg-red-700 text-white font-semibold rounded transition mt-6 disabled:opacity-50 disabled:cursor-not-allowed"
      >
        {{ isLoading() ? 'Registrando...' : 'Registrar' }}
      </button>
    </form>

    <p class="text-center text-slate-400 text-sm mt-6">
      ¿Ya tienes una cuenta?
      <a routerLink="/login" class="text-red-600 hover:text-red-500 font-medium cursor-pointer">
        Inicia Sesión
      </a>
    </p>
  </div>
</div>
