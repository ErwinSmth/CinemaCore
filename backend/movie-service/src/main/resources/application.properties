# =======================================================================
# SPRING BOOT CONFIGURATION - MOVIE SERVICE
# =======================================================================

# --- API ROUTING ---
server.servlet.context-path=/api/v1
server.port=8082

# --- DATASOURCE (POSTGRESQL) ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/db_movies}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- HIBERNATE ORM ---
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# --- FLYWAY MIGRATIONS ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# --- REDIS CACHE ---
spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}

# --- TMDB REST CLIENT ---
# URL base de la API externa
tmdb.api.url=https://api.themoviedb.org/3
# Credenciales tomadas automáticamente del archivo oculto .env en entorno local
tmdb.api.key=${TMDB_API_KEY:}
tmdb.api.token=${TMDB_API_TOKEN:}


