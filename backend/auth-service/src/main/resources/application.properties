# ==========================================
# Configuración del Servidor Central PostgreSQL
# ==========================================
server.port=8081
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:db_auth}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuracion de Hibernate / JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# ==========================================
# Automatización con Flyway (Migraciones)
# ==========================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration  
spring.flyway.baseline-on-migrate=true

# ==========================================
# Configuración JWT (Json Web Token)
# ==========================================
# Llave secreta inyectada desde el archivo .env global de Docker
jwt.secret=${JWT_SECRET}
# Tiempo de expiración en milisegundos (Ej. 3600000 ms = 1 Hora)
jwt.expiration=3600000